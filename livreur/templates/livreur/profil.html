{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon profil — Livreur</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="{% static 'livreur/css/dashboard.css' %}">
</head>
<body>

<div class="app">

  <header class="topbar">
    <div class="topbar-left">
      <h1>Mon profil</h1>
      <p>{{ livreur.telephone }}</p>
    </div>
  </header>

  <nav class="sidenav">
    <a class="sidenav-item" href="{% url 'livreur:dashboard' %}" style="text-decoration:none; color:inherit;">
      <i class="ti ti-truck"></i>
      <span>Livraisons</span>
    </a>
    <div class="sidenav-item active">
      <i class="ti ti-user"></i>
      <span>Profil</span>
    </div>
  </nav>

  <main class="content">
    <div class="delivery-card">
      <p style="font-weight:700; color:#1a3a0a; margin-bottom:8px;">{{ livreur.prenom }} {{ livreur.nom }}</p>
      <p style="color:#6b7280; font-size:13px; margin-bottom:4px;">{{ livreur.telephone }}</p>
      <p style="color:#6b7280; font-size:13px; margin-bottom:16px;">{{ livreur.adresse }}</p>
      <form method="post" action="{% url 'livreur:deconnexion' %}">
        {% csrf_token %}
        <button type="submit" class="btn-confirm">Se déconnecter</button>
      </form>
    </div>
  </main>

  <nav class="bottom-nav">
    <a class="nav-item" href="{% url 'livreur:dashboard' %}" style="text-decoration:none;">
      <i class="ti ti-truck"></i>
      <span>Livraisons</span>
    </a>
    <div class="nav-item active">
      <i class="ti ti-user"></i>
      <span>Profil</span>
    </div>
  </nav>

</div>

<!-- Bouton flottant boutique -->
<a href="{% url 'accueil' %}"
   title="Voir la boutique"
   style="position:fixed;top:1.25rem;right:1.25rem;z-index:200;
          display:flex;align-items:center;gap:8px;
          background:#2d5a27;color:#fff;border-radius:999px;
          padding:0.65rem 1.1rem;text-decoration:none;
          box-shadow:0 8px 24px rgba(0,0,0,0.25);
          font-size:0.8rem;font-weight:700;
          transition:transform 0.2s,box-shadow 0.2s;"
   onmouseover="this.style.transform='scale(1.06)';this.style.boxShadow='0 12px 32px rgba(0,0,0,0.35)'"
   onmouseout="this.style.transform='';this.style.boxShadow='0 8px 24px rgba(0,0,0,0.25)'">
  <svg width="18" height="18" fill="white" viewBox="0 0 24 24">
    <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M17 20a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-8 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
  </svg>
  Boutique
</a>

</body>
</html>
