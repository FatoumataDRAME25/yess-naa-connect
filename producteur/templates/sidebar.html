<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tableau de bord — Riz Local{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        @keyframes ynPop {
            0%   { transform: scale(0.95); opacity: 0; }
            60%  { transform: scale(1.02); }
            100% { transform: scale(1);    opacity: 1; }
        }
        #yn-confirm-overlay { backdrop-filter: blur(2px); }
        #yn-confirm-box { animation: ynPop 0.22s ease both; }
    </style>
</head>
<body class="flex min-h-screen bg-[#f5f6f8] font-sans antialiased">

    <!-- Topbar mobile -->
    <header class="md:hidden fixed top-0 inset-x-0 z-40 bg-[#2d5a27] text-white flex items-center justify-between px-4 h-14">
        <h1 class="font-bold text-base tracking-wide leading-tight">
            Riz <span class="text-[#7ec86e] text-base font-bold">Local</span>
        </h1>
        <button onclick="openMobileMenu()" aria-label="Menu" class="text-white">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
        </button>
    </header>

    <!-- Overlay + drawer mobile -->
    <div id="menu-overlay" onclick="closeMobileMenu()"
         class="hidden md:hidden fixed inset-0 bg-black/50 z-50"></div>

    <!-- Sidebar (desktop fixe / drawer mobile) -->
    <aside id="mobile-menu"
           class="w-60 shrink-0 bg-[#2d5a27] text-white flex flex-col justify-between fixed inset-y-0 left-0 z-50
                  transform -translate-x-full transition-transform duration-300 ease-in-out
                  md:translate-x-0 md:flex">
        <div class="pt-8 px-5">
            <div class="flex items-center justify-between mb-10 md:mb-10">
                <h1 class="font-bold text-base tracking-wide leading-tight">
                    Riz
                    <span class="text-[#7ec86e] text-base font-bold">Local</span>
                </h1>
                <button onclick="closeMobileMenu()" aria-label="Fermer" class="md:hidden text-white/70">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <nav class="space-y-1 -mx-5">

                <!-- Tableau de bord -->
                <a href="{% url 'dashbord' %}"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold transition-colors
                          {% if request.resolver_match.url_name == 'dashbord' %}
                              bg-white text-[#2d5a27]
                          {% else %}
                              text-white hover:bg-white/10 rounded-lg mx-2 px-3
                          {% endif %}">
                    <i class="fa-solid fa-table-cells w-5 h-5 shrink-0"></i>
                    Tableau de bord
                </a>

                <!-- Mes récoltes -->
                <a href="{% url 'mes_recoltes' %}"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold transition-colors
                          {% if request.resolver_match.url_name == 'mes_recoltes' %}
                              bg-white text-[#2d5a27]
                          {% else %}
                              text-white hover:bg-white/10 rounded-lg mx-2 px-3
                          {% endif %}">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7L12 3 4 7v10l8 4 8-4z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 7l8 4 8-4"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 11v10"/>
                    </svg>
                    Mes récoltes
                </a>

                <!-- Mes commandes -->
                <a href="{% url 'commandes' %}"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold transition-colors
                          {% if request.resolver_match.url_name == 'commandes' %}
                              bg-white text-[#2d5a27]
                          {% else %}
                              text-white hover:bg-white/10 rounded-lg mx-2 px-3
                          {% endif %}">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    Mes commandes
                </a>

                <!-- Mon Profil -->
                <a href="{% url 'profil' %}"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold transition-colors
                          {% if request.resolver_match.url_name == 'profil' %}
                              bg-white text-[#2d5a27]
                          {% else %}
                              text-white hover:bg-white/10 rounded-lg mx-2 px-3
                          {% endif %}">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Mon Profil
                </a>

            </nav>
        </div>

        <div class="px-5 pb-8">
            <hr class="border-white/20 mb-4">
            <form method="POST" action="{% url 'deconnexion' %}">
                {% csrf_token %}
                <button type="submit"
                        class="flex items-center gap-3 py-2 text-base font-semibold text-white hover:text-[#7ec86e] transition-colors w-full text-left">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                    Déconnexion
                </button>
            </form>
        </div>
    </aside>

    <!-- Contenu principal -->
    <main class="md:ml-60 flex-1 min-h-screen pt-14 md:pt-0">

        {% if messages %}
        <div class="px-4 md:px-10 pt-6 flex flex-col gap-2">
            {% for message in messages %}
            <div class="px-4 py-3 rounded-xl text-sm font-medium
                {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
                {% else %}bg-green-50 text-green-700 border border-[#D4EDB8]{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <!-- Modal de confirmation (remplace window.confirm) -->
    <div id="yn-confirm-overlay" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center px-4">
        <div id="yn-confirm-box" class="bg-white rounded-2xl shadow-xl shadow-black/20 max-w-sm w-full p-6 text-center">
            <div class="w-14 h-14 rounded-full bg-[#7ec86e]/15 flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-[#2d5a27]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/>
                </svg>
            </div>
            <p id="yn-confirm-message" class="font-bold text-gray-800 text-base mb-6">Confirmer cette action ?</p>
            <div class="flex items-center gap-3">
                <button type="button" id="yn-confirm-cancel"
                        class="flex-1 py-2.5 rounded-xl border border-gray-200 text-gray-600 font-semibold hover:bg-gray-50 transition">
                    Annuler
                </button>
                <button type="button" id="yn-confirm-ok"
                        class="flex-1 py-2.5 rounded-xl bg-[#2d5a27] text-white font-semibold hover:bg-green-800 transition">
                    Confirmer
                </button>
            </div>
        </div>
    </div>

    <script>
        function openMobileMenu() {
            document.getElementById('mobile-menu').classList.remove('-translate-x-full');
            document.getElementById('menu-overlay').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        function closeMobileMenu() {
            document.getElementById('mobile-menu').classList.add('-translate-x-full');
            document.getElementById('menu-overlay').classList.add('hidden');
            document.body.style.overflow = '';
        }
    </script>

    <!-- ═══════════════════════════════════════════
         BOUTON FLOTTANT — Accès rapide à la boutique
    ═══════════════════════════════════════════ -->
    <a href="{% url 'accueil' %}"
       title="Voir la boutique"
       class="fixed top-5 right-5 z-[80] group flex items-center gap-2
              bg-[#2d5a27] hover:bg-[#1e3e1b] text-white
              shadow-lg shadow-black/25 hover:shadow-xl
              rounded-full px-4 py-3 transition-all duration-300
              hover:scale-105 active:scale-95"
       style="text-decoration:none;">
      <svg class="w-5 h-5 shrink-0" fill="white" viewBox="0 0 24 24">
        <path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13l-1.4 7h12.8M7 13L5.4 5M17 20a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm-8 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
      </svg>
      <span style="max-width:0;overflow:hidden;white-space:nowrap;transition:max-width 0.3s;font-size:0.875rem;font-weight:700;"
            class="group-hover:max-w-xs">
        Boutique
      </span>
    </a>

    <script>
    (function () {
        'use strict';
        var overlay = document.getElementById('yn-confirm-overlay');
        var box = document.getElementById('yn-confirm-box');
        var msgEl = document.getElementById('yn-confirm-message');
        var btnOk = document.getElementById('yn-confirm-ok');
        var btnCancel = document.getElementById('yn-confirm-cancel');
        var pendingForm = null;
        var pendingHref = null;

        function open(message) {
            msgEl.textContent = message;
            overlay.classList.remove('hidden');
            box.style.animation = 'none';
            void box.offsetWidth;
            box.style.animation = '';
        }
        function close() {
            overlay.classList.add('hidden');
            pendingForm = null;
            pendingHref = null;
        }

        document.addEventListener('submit', function (e) {
            var form = e.target;
            if (form.dataset && form.dataset.confirm && !form.dataset.confirmed) {
                e.preventDefault();
                pendingForm = form;
                open(form.dataset.confirm);
            }
        }, true);

        document.addEventListener('click', function (e) {
            var el = e.target.closest('a[data-confirm]');
            if (el) {
                e.preventDefault();
                pendingHref = el.getAttribute('href');
                open(el.dataset.confirm);
            }
        });

        btnOk.addEventListener('click', function () {
            if (pendingForm) {
                pendingForm.dataset.confirmed = '1';
                pendingForm.submit();
            } else if (pendingHref) {
                window.location.href = pendingHref;
            }
            close();
        });
        btnCancel.addEventListener('click', close);
        overlay.addEventListener('click', function (e) {
            if (e.target === overlay) close();
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && !overlay.classList.contains('hidden')) close();
        });
    })();
    </script>

</body>
</html>
