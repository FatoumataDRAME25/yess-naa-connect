<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Tableau de bord — YEES NAA CONNECT{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="flex min-h-screen bg-[#f5f6f8] font-sans antialiased">

    <!-- Sidebar -->
    <aside class="w-60 shrink-0 bg-[#2d5a27] text-white flex flex-col justify-between fixed inset-y-0 left-0 z-30">
        <div class="pt-8 px-5">
            <h1 class="font-bold text-base tracking-wide leading-tight mb-10">
                YEES NAA
                <span class="text-[#7ec86e] text-base font-bold">CONNECT</span>
            </h1>

            <nav class="space-y-1 -mx-5">
                <a href="{% url 'dashbord' %}"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold transition-colors
                          {% if request.resolver_match.url_name == 'dashbord' %}
                          bg-white text-[#2d5a27] rounded-none
                          {% else %}
                          text-white hover:bg-white/10 rounded-lg mx-2 px-3
                          {% endif %}">
                    <i class="fa-solid fa-table-cells w-5 h-5 shrink-0"></i>
                    Tableau de bord
                </a>
                <a href="#"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold text-white hover:bg-white/10 transition-colors">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
                    </svg>
                    Mes commandes
                </a>
                <a href="#"
                   class="flex items-center gap-3 py-3 pl-5 pr-4 text-base font-semibold text-white hover:bg-white/10 transition-colors">
                    <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    Mon Profil
                </a>
            </nav>
        </div>

        <div class="px-5 pb-8">
            <hr class="border-white/20 mb-4">
            <a href="#" class="flex items-center gap-3 py-2 text-base font-semibold text-white hover:text-[#7ec86e] transition-colors">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
                Déconnexion
            </a>
        </div>
    </aside>

    <!-- Contenu principal -->
    <main class="ml-60 flex-1 min-h-screen">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
