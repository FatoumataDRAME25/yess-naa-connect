{% extends "sidebar.html" %}

{% load static %}

{% block title %}Declaration{% endblock  %}

{% block content %}

    <div class="w-full px-10 py-8 flex flex-col gap-8 items-center">

      <!-- Page title -->
      <h1 class="text-3xl font-bold text-green-brand w-full max-w-3xl">Déclaration Stocks Paddy</h1>

      <!-- Form card -->
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 flex flex-col gap-7 max-w-3xl mx-auto">

        <!-- Photo de la récolte -->
        <div class="flex flex-col gap-3">
          <label class="text-sm font-semibold text-green-brand">Photo de la récolte</label>
          <div class="border-2 border-gray-200 rounded-xl p-6 bg-gray-50/50 flex flex-col items-center gap-3 cursor-pointer hover:border-green-accent transition-colors">
            <!-- Preview zone -->
            <div class="w-full h-48 rounded-lg overflow-hidden bg-gray-100 flex items-center justify-center">
              <img class="w-full h-full object-cover opacity-80" src="https://placehold.co/635x192" alt="Preview" />
            </div>
            <div class="flex flex-col items-center gap-1">
              <p class="text-base font-semibold text-green-accent">Glissez une photo ou cliquez pour parcourir</p>
              <p class="text-xs text-gray-500">Format JPG, PNG (Max 5MB)</p>
            </div>
            <input type="file" class="hidden" accept="image/*" />
          </div>
        </div>

        <!-- Variété + Quantité -->
        <div class="grid grid-cols-2 gap-6">
          <!-- Variété de riz -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-green-brand">Variété de riz</label>
            <div class="relative">
              <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-base text-green-brand appearance-none outline-none focus:border-green-accent focus:ring-2 focus:ring-green-accent/10 transition cursor-pointer">
                <option>Riz Paddy Parfumé</option>
                <option>Sahel 108</option>
                <option>Nerica L19</option>
                <option>Tox 728-1</option>
              </select>
              <svg class="w-4 h-4 text-gray-500 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <!-- Quantité -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-green-brand">Quantité disponible (kg)</label>
            <div class="flex items-center bg-gray-50 border border-gray-200 rounded-lg overflow-hidden">
              <button class="px-4 py-3 text-gray-500 hover:text-green-brand hover:bg-gray-100 transition-colors text-xl font-medium flex-shrink-0">−</button>
              <input type="number" value="1200" class="flex-1 text-center py-3 bg-transparent text-base font-medium text-green-brand outline-none" />
              <button class="px-4 py-3 text-gray-500 hover:text-green-brand hover:bg-gray-100 transition-colors text-xl font-medium flex-shrink-0">+</button>
            </div>
          </div>
        </div>

        <!-- Date + Région -->
        <div class="grid grid-cols-2 gap-6">
          <!-- Date de récolte -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-green-brand">Date de récolte</label>
            <div class="relative">
              <input type="date" value="2026-12-06" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-base text-green-brand outline-none focus:border-green-accent focus:ring-2 focus:ring-green-accent/10 transition" />
            </div>
          </div>

          <!-- Région de production -->
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold text-green-brand">Région de production</label>
            <div class="relative">
              <select class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-base text-green-brand appearance-none outline-none focus:border-green-accent focus:ring-2 focus:ring-green-accent/10 transition cursor-pointer">
                <option>Saint-Louis</option>
                <option>Dakar</option>
                <option>Thiès</option>
                <option>Ziguinchor</option>
                <option>Kaolack</option>
              </select>
              <svg class="w-4 h-4 text-gray-500 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
        </div>

        <!-- Prix proposé -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-green-brand">Prix proposé (FCFA/kg)</label>
          <div class="relative">
            <input type="number" value="180" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-base font-semibold text-green-brand outline-none focus:border-green-accent focus:ring-2 focus:ring-green-accent/10 transition pr-24" />
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-medium text-gray-500">FCFA / kg</span>
          </div>
        </div>

        <!-- Particularités -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-semibold text-green-brand">Particularités de votre récolte <span class="text-gray-400 font-normal">(optionnel)</span></label>
          <textarea rows="4" placeholder="Ex: Grains très longs, récolte sous abri, faible taux d'humidité..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-base text-green-brand placeholder-gray-400 outline-none focus:border-green-accent focus:ring-2 focus:ring-green-accent/10 transition resize-none"></textarea>
        </div>

        <!-- Submit button -->
        <div class="flex justify-end">
          <button class="flex items-center gap-2 bg-sidebar text-white px-8 py-4 rounded-xl text-lg font-bold shadow-md hover:bg-green-900 transition-colors">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Publier ma récolte
          </button>
        </div>

      </div>
    </div>

{% endblock  %}
