<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Riz Local — Espace Transformatrice{% endblock %}</title>

    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'yn-green-dark': '#1A3A0A',
                        'yn-green': '#2D5A16',
                        'yn-green-light': '#7DBD48',
                        'yn-green-pale': '#D4EDB8',
                        'yn-terracotta': '#C85A1A',
                        'yn-gold': '#D4A017',
                        'yn-ivory': '#F7F3ED',
                        'yn-gray': '#6B7280',
                    },
                    fontFamily: {
                        'heading': ['Poppins', 'Sora', 'sans-serif'],
                        'body': ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-heading { font-family: 'Poppins', sans-serif; }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body class="bg-yn-ivory min-h-screen">

    <div class="flex min-h-screen">

        <!-- ============ SIDEBAR ============ -->
        <aside class="w-72 bg-yn-green-dark flex flex-col justify-between fixed h-screen">
            <div>
                <!-- Logo -->
                <div class="px-8 pt-8 pb-10">
                    <a href="{% url 'admin_transformatrice:admin_dashboard' %}" class="font-heading font-extrabold text-xl">
                        <span class="text-white">Riz</span>
                        <span class="text-yn-green-light">Local</span>
                    </a>
                </div>

                <!-- Navigation -->
                <nav class="flex flex-col">
                    <a href="{% url 'admin_transformatrice:admin_dashboard' %}"
                       class="flex items-center gap-3 px-8 py-4 text-white/90 hover:bg-white/5 transition
                              {% if active_nav == 'dashboard' %}bg-white/10 border-l-4 border-yn-gold font-semibold{% endif %}">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z"/></svg>
                        Tableau de bord
                    </a>
                    <a href="{% url 'admin_transformatrice:admin_stocks' %}"
                       class="flex items-center gap-3 px-8 py-4 text-white/90 hover:bg-white/5 transition
                              {% if active_nav == 'stocks' %}bg-white/10 border-l-4 border-yn-gold font-semibold{% endif %}">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2L3 6v8l7 4 7-4V6l-7-4z"/></svg>
                        Stocks Producteurs
                    </a>
                    <a href="{% url 'admin_transformatrice:admin_catalogue' %}"
                       class="flex items-center gap-3 px-8 py-4 text-white/90 hover:bg-white/5 transition
                              {% if active_nav == 'catalogue' %}bg-white/10 border-l-4 border-yn-gold font-semibold{% endif %}">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 4h14v2H3V4zm0 5h14v2H3V9zm0 5h14v2H3v-2z"/></svg>
                        Catalogue
                    </a>
                    <a href="{% url 'admin_transformatrice:admin_commandes' %}"
                       class="flex items-center gap-3 px-8 py-4 text-white/90 hover:bg-white/5 transition
                              {% if active_nav == 'commandes' %}bg-white/10 border-l-4 border-yn-gold font-semibold{% endif %}">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M3 3h2l.4 2M7 13h7l3-8H5.4M7 13L5.4 5M7 13l-1.5 3h9"/></svg>
                        Commandes Clients
                    </a>
                </nav>
            </div>

            <!-- Déconnexion -->
            <form method="post" action="{% url 'admin_transformatrice:admin_logout' %}" class="px-8 pb-8">
                {% csrf_token %}
                <button type="submit" class="flex items-center gap-3 text-white/80 hover:text-white transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                    Déconnexion
                </button>
            </form>
        </aside>

        <!-- ============ CONTENU PRINCIPAL ============ -->
        <main class="flex-1 ml-72 p-10">
            {% block content %}{% endblock %}
        </main>

    </div>

    {% block extra_js %}{% endblock %}

</body>
</html>
